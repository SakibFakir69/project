services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      COBALT_URL: "http://cobalt-api:9000"  # ✅ This is correct
    depends_on:
      - cobalt-api

  cobalt-api:
    image: ghcr.io/imputnet/cobalt:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      API_URL: "http://downtubebest.duckdns.org:5000"   # ✅ Change to your VPS IP
      CORS_WILDCARD: "1"
      RATE_LIMIT_MAX: "100"
      RATE_LIMIT_WINDOW: "60"
      DURATION_LIMIT: "10800"
      COOKIE_PATH: "/cookies.json"
      API_EXTERNAL_PROXY: "http://ypadwxjb-rotate:fxazhyr9knac@p.webshare.io:80"
    volumes:
      - ./cookies.json:/cookies.json

  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 3600 --cleanup