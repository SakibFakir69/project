# docker-compose.yml  —  Production-hardened video downloader stack

version: "3.9"

networks:
  internal:
    driver: bridge

volumes:
  cobalt_tmp: {}

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      NODE_ENV:   production
      COBALT_URL: "http://cobalt-api:9000"
    networks:
      - internal
    depends_on:
      cobalt-api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus:   "2.0"
          memory: "2G"
        reservations:
          cpus:   "0.5"
          memory: "512M"
    healthcheck:
      test:     ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 20s
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  cobalt-api:
    image: ghcr.io/imputnet/cobalt:latest
    restart: unless-stopped
    expose:
      - "9000"
    networks:
      - internal
    environment:
      API_URL:            "https://downtubebest.duckdns.org"
      CORS_WILDCARD:      "1"
      RATE_LIMIT_MAX:     "200"
      RATE_LIMIT_WINDOW:  "60"
      DURATION_LIMIT:     "10800"
      COOKIE_PATH:        "/cookies.json"
      API_EXTERNAL_PROXY: "${COBALT_PROXY}"
    volumes:
      - ./cookies.json:/cookies.json:ro
      - cobalt_tmp:/tmp/cobalt
    deploy:
      resources:
        limits:
          cpus:   "1.5"
          memory: "1G"
        reservations:
          cpus:   "0.25"
          memory: "256M"
    healthcheck:
      test:     ["CMD", "wget", "--spider", "-q", "http://localhost:9000/"]
      interval: 20s
      timeout:  8s
      retries:  5
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "3"

  watchtower:
    image: containrrr/watchtower:1.4.0
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      --interval 3600
      --cleanup
      --rolling-restart
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus:   "0.1"
          memory: "64M"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"